
  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فريق منا وفينا</title>

<style>
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(180deg,#f8ecd8,#f3ead8);
  font-family:Tahoma, Arial, sans-serif;
  text-align:center;
  padding:35px 18px;
}

.logo{
  width:140px;
  border-radius:25px;
  margin-bottom:5px;
}

h1{
  color:#17602f;
  font-size:34px;
  margin:2px 0;
}

.subtitle{
  color:#7b7b7b;
  font-size:15px;
  margin-bottom:35px;
}

.card{
  background:#fff;
  border-radius:28px;
  padding:18px;
  margin:18px auto;
  max-width:520px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.avatar{
  width:65px;
  height:65px;
  border-radius:50%;
  background:#e5eddd;
  color:#17602f;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
}

.name{
  font-size:20px;
  font-weight:bold;
  color:#1f2933;
}

.btn{
  background:#edf5ed;
  color:#17602f;
  text-decoration:none;
  padding:10px 18px;
  border-radius:18px;
  font-size:10px;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:7px;
}

.in{
  font-size:18px;
  font-weight:bold;
}

.arrow{
  font-size:18px;
}

.footer{
  margin-top:40px;
  color:#8c8c8c;
  font-size:15px;
}
</style>
</head>

<body>

<img src="1539235D-BBC5-480C-A054-6E7D8538BA81.png" class="logo">

<h1>فريق منا وفينا</h1>
<div class="subtitle">تواصل معنا عبر لينكدإن</div>

<div class="card">
  <div class="avatar">رم</div>
  <div class="name">ريناد الماضي</div>
<a class="btn" href="#">
  <span>تواصل معنا</span>
  <span class="in">in</span>
  <span class="arrow">←</span>
</a>
</div>

<div class="card">
  <div class="avatar">ور</div>
  <div class="name">ولاء الرشيدي</div>
<a class="btn" href="#">
  <span>تواصل معنا</span>
  <span class="in">in</span>
  <span class="arrow">←</span>
</a>
</div>

<div class="card">
  <div class="avatar">عر</div>
  <div class="name">عبدالله الرشيد</div>
<a class="btn" href="#">
  <span>تواصل معنا</span>
  <span class="in">in</span>
  <span class="arrow">←</span>
</a>
</div>

<div class="footer">
صُنع بعناية من فريق منا وفينا 🌳🏡

</html>
