<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>فريق منا وفينا</title>

<style>

body{
    margin:0;
    min-height:100vh;
    background:#f4ead7;
    font-family:Tahoma, Arial, sans-serif;
    text-align:center;
    padding:10px 20px 35px;
}

.logo{
    width:110px;
    margin-bottom:8px;
}

h1{
    margin:0;
    color:#17602f;
    font-size:34px;
    font-weight:700;
}

.subtitle{
    color:#888;
    font-size:16px;
    margin-top:8px;
    margin-bottom:30px;
}

.card{
    background:#fff;
    border-radius:28px;
    max-width:650px;
    margin:18px auto;
    padding:18px 20px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.right{
    display:flex;
    align-items:center;
    gap:15px;
}

.avatar{
    width:72px;
    height:72px;
    border-radius:50%;
    background:#e8efe3;

    display:flex;
    align-items:center;
    justify-content:center;

    color:#17602f;
    font-size:28px;
    font-weight:bold;
}

.name{
    font-size:22px;
    font-weight:700;
    color:#1f2933;
    white-space:nowrap;
}

.btn{
    background:#edf5ed;
    color:#17602f;
    text-decoration:none;

    padding:10px 16px;
    border-radius:18px;

    display:flex;
    align-items:center;
    gap:6px;

    font-size:15px;
    font-weight:bold;

    transition:.2s;
}

.btn:hover{
    background:#dcebdc;
}

.in{
    font-size:18px;
    font-weight:bold;
}

.arrow{
    font-size:18px;
}

.footer{
    margin-top:40px;
    color:#888;
    font-size:15px;
}

@media(max-width:600px){

    .card{
        padding:16px;
    }

    .name{
        font-size:18px;
    }

    .avatar{
        width:64px;
        height:64px;
        font-size:24px;
    }

    .btn{
        font-size:13px;
        padding:8px 12px;
    }

}

</style>
</head>

<body>

<img src="logo.png" class="logo">

<h1>فريق منا وفينا</h1>

<div class="subtitle">
تواصل معنا عبر لينكدإن
</div>

<!-- ريناد -->

<div class="card">

    <div class="right">
        <div class="avatar">رم</div>
        <div class="name">ريناد الماضي</div>
    </div>

    <a class="btn"
       href="https://www.linkedin.com/in/reenad-almadhi-380962245"
       target="_blank">

        <span>تواصل معنا</span>
        <span class="in">in</span>
        <span class="arrow">←</span>

    </a>

</div>

<!-- ولاء -->

<div class="card">

    <div class="right">
        <div class="avatar">ور</div>
        <div class="name">ولاء الرشيدي</div>
    </div>

    <a class="btn"
       href="#"
       target="_blank">

        <span>تواصل معنا</span>
        <span class="in">in</span>
        <span class="arrow">←</span>

    </a>

</div>

<!-- عبدالله -->

<div class="card">

    <div class="right">
        <div class="avatar">عر</div>
        <div class="name">عبدالله الرشيد</div>
    </div>

    <a class="btn"
       href="#"
       target="_blank">

        <span>تواصل معنا</span>
        <span class="in">in</span>
        <span class="arrow">←</span>

    </a>

</div>

<div class="footer">
🌳🏡 صُنع بعناية من فريق منا وفينا
</div>

</body>
</html>
