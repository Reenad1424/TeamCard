    align-items:center;

.profile{

    gap:15px;
}

.avatar{
    width:72px;
    height:72px;

    font-weight:bold;

.role{

.btn{

    text-decoration:none;

    padding:12px 18px;
    border-radius:18px;

    font-size:15px;
    font-weight:bold;

}

.btn:hover{
    background:#dce9d9;
}

.footer{
    margin-top:35px;

    font-size:15px;
