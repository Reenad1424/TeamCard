<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>فريق منا وفينا</title>

<style>

body{
background:#f4ead7;
font-family:Tahoma;
padding:40px;
text-align:center;
}

.logo{
font-size:45px;
margin-bottom:10px;
}

.title{
font-size:38px;
font-weight:bold;
color:#1f6a3b;
}

.subtitle{
color:#666;
margin-bottom:40px;
}

.card{
background:white;
border-radius:20px;
padding:20px;
margin:20px auto;
max-width:600px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:#dfe8d8;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-weight:bold;
color:#1f6a3b;
}

.name{
font-size:28px;
font-weight:bold;
}

.btn{
background:#e7f0e8;
padding:12px 25px;
border-radius:15px;
text-decoration:none;
color:#1f6a3b;
font-weight:bold;
}

</style>
</head>

<body>

<div class="logo">🏡🌳</div>

<div class="title">
فريق منا وفينا
</div>

<div class="subtitle">
تواصل معنا عبر لينكدإن
</div>

<div class="card">
<div class="avatar">رم</div>
<div class="name">ريناد الماضي</div>
<a class="btn" href="#">LinkedIn</a>
</div>

<div class="card">
<div class="avatar">ور</div>
<div class="name">ولاء الرشيدي</div>
<a class="btn" href="#">LinkedIn</a>
</div>

<div class="card">
<div class="avatar">عر</div>
<div class="name">عبدالله الرشيد</div>
<a class="btn" href="#">LinkedIn</a>
</div>

</body>
</html>
